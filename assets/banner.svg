<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="Sluice - route every token, account for every cent">
  <defs>
    <radialGradient id="glow-sl" cx="0.22" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#3d8bd4" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#3d8bd4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="edge-sl" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3d8bd4"/>
      <stop offset="1" stop-color="#3d8bd4" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="#131619"/>
  <rect width="1280" height="320" fill="url(#glow-sl)"/>

  <!-- faint oversized mark, right side texture -->
  <g transform="translate(1000,30) scale(3.6)" opacity="0.05">
    <path d="M6 12 h20 v12 l14 8 -14 8 v12 h-20 z" fill="#3d8bd4"/>
    <path d="M46 24 h22 M46 40 h22" stroke="#3d8bd4" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- mark: gate splitting one flow into metered channels -->
  <g transform="translate(96,112)">
    <rect x="0" y="8" width="10" height="60" rx="2" fill="#3d8bd4"/>
    <path d="M18 16 h26 l10 6 -10 6 h-26 z" fill="#3d8bd4"/>
    <path d="M18 36 h40 l10 6 -10 6 h-40 z" fill="#3d8bd4" opacity="0.75"/>
    <path d="M18 56 h18 l10 6 -10 6 h-18 z" fill="#3d8bd4" opacity="0.5"/>
  </g>

  <!-- wordmark -->
  <text x="208" y="163" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="64" font-weight="700" letter-spacing="-1" fill="#ebeff2">sluice</text>
  <text x="210" y="205" font-family="-apple-system,'Segoe UI',Helvetica,Arial,sans-serif" font-size="21" fill="#a3adb6">Route every token, account for every cent.</text>

  <text x="210" y="243" font-family="ui-monospace,'SF Mono',Menlo,Consolas,monospace" font-size="14" fill="#6e7881">one OpenAI-compatible endpoint · policy routing · retries + breakers · cost ledger · OTel + Langfuse</text>

  <rect x="96" y="272" width="420" height="2" fill="url(#edge-sl)"/>
</svg>
